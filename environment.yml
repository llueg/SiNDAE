name: sindae
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  # mpi4py from conda-forge links against a real MPI (OpenMPI); pip install
  # requires a system MPI and frequently fails on fresh machines.
  - mpi4py>=3.1
  # cyipopt from conda-forge bundles IPOPT compiled against MUMPS (open source)
  # so no HSL license or standalone IPOPT binary is required.
  - cyipopt>=1.4
  - pip
  - pip:
    - numpy>=1.24
    - scipy>=1.10
    - matplotlib>=3.7
    #   pip install "jax[cuda12]"  (NVIDIA)
    #   pip install "jax[metal]"   (Apple Silicon)
    - jax[cpu]>=0.4.30
    - jaxlib>=0.4.30
    - equinox>=0.11
    - optax>=0.2
    - pyomo>=6.7
    - pounce-solver>=0.4
    - -e .
