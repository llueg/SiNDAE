# See docs at: https://mystmd.org/guide/frontmatter
version: 1
project:
  id: c3c4e470-ddee-4bae-8263-9b574a83ca09
  title: SiNDAE
  description: A Python package for identifying unknown nonlinear terms in ODE/DAE systems using a simultaneous NLP approach.
  keywords: ["scientific machine learning", "neural ODE", "DAE", "implicit differentiation", "UDE"]
  authors:
    - name: Laurens Lueg
    - name: Nicolas Smits
  github: https://github.com/llueg/SiNDAE/
  jupyter:
    binder:
      repo: https://github.com/llueg/SiNDAE/
      ref: ci-setup/
  bibliography:
    - docs/references.bib
  exclude:
    - CLAUDE.md
    - CHANGES.md
    # Autogenerated API fragments — pulled into docs/api/*.md via {include},
    # so they must not be built as standalone pages. Regenerate with
    # `python docs/generate_api.py` (see that script's header).
    - docs/api/_generated/**
  # First toc item = landing page (no children allowed).
  # All other entries follow at the same level or under title: sections.
  toc:
    - file: docs/index.md
    - file: docs/installation.md
    - file: docs/quickstart.md
    - file: docs/hybrid_dae_overview.md
    - title: Solvers
      children:
        - file: docs/simultaneous_solver.md
        - file: docs/decomposition_solver.md
    - title: API Reference
      children:
        - file: docs/api/index.md
        - file: docs/api/problem.md
        - file: docs/api/data_utils.md
        - file: docs/api/nn_utils.md
        - file: docs/api/network_architecture.md
        - file: docs/api/pretrain.md
        - file: docs/api/smoother.md
        - file: docs/api/simultaneous.md
        - file: docs/api/decomp.md
        - file: docs/api/inference.md
    - title: Examples
      children:
        - file: docs/examples_gallery/index.md
        - file: docs/examples_gallery/four_tank_example.ipynb
        - file: docs/examples_gallery/leslie_gower_example.ipynb
        - file: docs/examples_gallery/fedbatch_example.ipynb
        - file: docs/examples_gallery/fedbatch_partial_obs_example.ipynb
        - file: docs/examples_gallery/fedbatch_validation_example.ipynb
    - file: docs/bibliography.md

site:
  template: book-theme

# NOTE: This project builds with Jupyter Book v2 / mystmd (the JavaScript MyST
# engine), which does not run Sphinx. A `sphinx:` config block here is ignored
# (mystmd logs "'config' extra key ignored: sphinx"), so Sphinx autodoc
# (`{autoclass}` / `{autofunction}`) is unavailable. The API reference is
# instead generated from docstrings by `docs/generate_api.py` (griffe -> MyST)
# and pulled into docs/api/*.md via the `{include}` directive.
