# Publish the sindae package to TestPyPI when a GitHub Release is published.
#
# Auth: PyPA Trusted Publishing (OIDC)

name: Publish to TestPyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/sindae
    permissions:
      contents: read     # checkout
      id-token: write    # OIDC token for Trusted Publishing
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # pyproject.toml is the single source of truth for the version. Fail loudly
      # if the release tag disagrees, so a mislabeled release cannot ship the
      # wrong (immutable) version to the index.
      - name: Verify tag matches pyproject version
        run: |
          PKG_VERSION="$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Release tag '$GITHUB_REF_NAME' (-> '$TAG') does not match pyproject.toml version '$PKG_VERSION'."
            exit 1
          fi
          echo "Version OK: $PKG_VERSION"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
