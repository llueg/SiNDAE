# Continuous integration: runs on every push to main and on every pull request.
# Two jobs run in parallel:
#   lint  - fast, pip-only, catches syntax / undefined-name errors and style issues
#   test  - sets up the full conda solver stack and runs the fast test suite
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# If you push again before a run finishes, cancel the older run for this branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      # Blocking: real errors (syntax errors, undefined names)
      - name: Critical errors
        run: ruff check --select=E9,F63,F7,F82 .

      # Advisory: full style lint. Does not fail the build (the `|| true`), so you can
      # tighten it gradually. Remove `|| true` once the codebase is clean.
      - name: Style (advisory)
        run: ruff check . || true

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build the conda environment from environment.yml (cyipopt, mpi4py, POUNCE, FERAL,
      # JAX, and `pip install -e .`).
      - name: Set up conda environment
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          init-shell: bash
          cache-environment: true

      - name: Install test dependencies
        shell: bash -el {0}
        run: pip install pytest

      # PyNumero's grey-box / return_nlp path (POUNCE-GBM, the decomp inner solve,
      # and the cyipopt oracle) builds an in-memory PyomoNLP, which needs the
      # compiled pynumero_ASL extension. Neither the conda nor the pip pyomo ships
      # it, so build it into ~/.pyomo/lib (needs a C/C++ toolchain + cmake).
      - name: Build PyNumero ASL extension
        shell: bash -el {0}
        run: |
          micromamba install -y -n sindae -c conda-forge cmake make c-compiler cxx-compiler
          pyomo download-extensions
          pyomo build-extensions
          python -c "from pyomo.contrib.pynumero.asl import AmplInterface; assert AmplInterface.available(), 'pynumero_ASL not available after build-extensions'; print('pynumero_ASL OK')"

      # Run only the fast suite.
      - name: Run fast tests
        shell: bash -el {0}
        env:
          MPLBACKEND: Agg
        run: pytest -m "not slow" -v
